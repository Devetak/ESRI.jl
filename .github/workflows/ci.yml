name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} (threads)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.12']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - name: Run tests
        env:
          JULIA_NUM_THREADS: 4
        run: julia --project=. -e 'using Pkg; Pkg.test()'

