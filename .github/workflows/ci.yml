name: CI

on:
  push:
  pull_request:

jobs:
  test-serial:
    name: Tests (serial)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Run package tests
        env:
          JULIA_NUM_THREADS: 1
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  test-threaded:
    name: Tests (threaded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Run package tests
        env:
          JULIA_NUM_THREADS: 4
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  quality:
    name: Quality (Aqua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Run quality tests
        env:
          JULIA_NUM_THREADS: 1
        run: julia --project=. -e 'using Pkg; Pkg.test(test_args=["quality"])'

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Install docs dependencies
        run: julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build docs
        env:
          JULIA_NUM_THREADS: 1
        run: julia --project=docs docs/make.jl
